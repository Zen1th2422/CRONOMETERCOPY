<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BulkMeter Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .check-btn.checked {
            background-color: #10b981 !important;
            border-color: #10b981 !important;
            color: #ffffff !important;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen pb-24">

    <header class="bg-slate-950 border-b border-slate-800 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tight text-emerald-400">BULKMETER <span class="text-white text-xs px-2 py-0.5 bg-slate-800 rounded-md ml-1 font-mono uppercase tracking-widest">PRO</span></h1>
                <p class="text-[10px] text-slate-400 tracking-wider font-semibold uppercase mt-0.5">Lean Bulk Analytics & Logging</p>
            </div>
            <div class="text-right">
                <span class="text-xs text-slate-500 block font-mono">STREAK</span>
                <span class="text-sm font-black text-white">🔥 14 Days</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div id="macro-tab" class="tab-content active space-y-6">
            <div class="bg-slate-950 border border-slate-800 rounded-3xl p-6 shadow-xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-500 to-teal-400"></div>
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Calorie Intake Engine</span>
                    <span class="text-xs font-mono text-slate-500">Target: 2400 kcal</span>
                </div>
                <div class="grid grid-cols-2 gap-4 items-center">
                    <div>
                        <span id="caloriesConsumed" class="text-5xl font-black text-white tracking-tighter block">0</span>
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wide">Consumed kcal</span>
                    </div>
                    <div class="text-right border-l border-slate-800 pl-4">
                        <span id="caloriesRemaining" class="text-3xl font-black text-emerald-400 tracking-tight block">2400</span>
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wide block">Remaining kcal</span>
                    </div>
                </div>
            </div>

            <div class="bg-slate-950 border border-slate-800 rounded-3xl p-5 shadow-xl space-y-4">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block">Target Macro Matrices</span>
                
                <div class="space-y-1.5">
                    <div class="flex justify-between text-xs font-semibold">
                        <span class="text-emerald-400 flex items-center gap-1">💪 Protein</span>
                        <span class="text-slate-300"><span id="proteinConsumed" class="font-bold text-white">0</span> / 170g</span>
                    </div>
                    <div class="w-full bg-slate-800 h-2.5 rounded-full overflow-hidden">
                        <div id="proteinBar" class="bg-emerald-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <div class="flex justify-between text-xs font-semibold">
                        <span class="text-amber-400 flex items-center gap-1">🌾 Carbohydrates</span>
                        <span class="text-slate-300"><span id="carbsConsumed" class="font-bold text-white">0</span> / 250g</span>
                    </div>
                    <div class="w-full bg-slate-800 h-2.5 rounded-full overflow-hidden">
                        <div id="carbsBar" class="bg-amber-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <div class="flex justify-between text-xs font-semibold">
                        <span class="text-rose-400 flex items-center gap-1">🥑 Dietary Fats</span>
                        <span class="text-slate-300"><span id="fatsConsumed" class="font-bold text-white">0</span> / 70g</span>
                    </div>
                    <div class="w-full bg-slate-800 h-2.5 rounded-full overflow-hidden">
                        <div id="fatsBar" class="bg-rose-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <button id="toggleScanner" class="w-full bg-emerald-500 text-slate-950 font-black py-4 px-4 rounded-2xl tracking-wide uppercase text-xs shadow-lg transition-all cursor-pointer">
                    Open Live Camera Scanner
                </button>
                
                <div id="scanner-container" class="hidden relative w-full aspect-video bg-black rounded-2xl overflow-hidden border-2 border-emerald-500/30 shadow-inner">
                    <div id="interactive" class="w-full h-full object-cover"></div>
                    <div class="absolute inset-x-4 top-1/2 h-0.5 bg-red-500 shadow-[0_0_8px_#ef4444] animate-pulse"></div>
                </div>
                <p id="statusMessage" class="hidden text-center text-xs font-mono text-amber-400 bg-amber-500/10 py-2 px-3 rounded-lg border border-amber-500/20"></p>
                <p id="scanNotice" class="hidden text-center text-xs font-bold text-
